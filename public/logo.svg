    <rect x="81" y="25" width="14" height="14" fill="#BB8E5E"/>
    <rect x="111" y="25" width="14" height="14" fill="#BB8E5E"/>
    
    <rect x="25" y="53" width="14" height="14" fill="#BB8E5E"/>
